name: Dingus Labs CI

on:
  push:
  pull_request:

permissions:
  actions: read
  contents: read
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:24.04

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git \
            python3 \
            python3-venv \
            python3-pip

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Mark safe repository
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: venv setup
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit
        run: |
          . venv/bin/activate
          pre-commit run --all-files

  build-test:
    runs-on: ubuntu-latest

    container:
      image: rostooling/setup-ros-docker:ubuntu-noble-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build workspace
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          target-ros2-distro: jazzy
        # package-name: |
          #   otomo_msgs
          #   dingus_control
          #   dingus_core
          #   dingus_plugins
          #   dingus_sim
          vcs-repo-file-url: dependencies.repos

      # - name: Build workspace
      #   run: |
      #     cd /tmp
      #     mkdir -p dingus_ws/src
      #     cd dingus_ws/src
      #     ln -s $GITHUB_WORKSPACE dingus_labs
      #     git clone https://github.com/TWALL9/async_serial.git
      #     cd /tmp/dingus_ws
      #     . /opt/ros/jazzy/setup.sh && rosdep update
      #     . /opt/ros/jazzy/setup.sh && rosdep install --rosdistro jazzy --from-paths src --ignore-src --dependency-types build -y
      #     . /opt/ros/jazzy/setup.sh && colcon build --symlink-install

  build-and-push:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ format('{0}/{1}', env.REGISTRY, env.IMAGE_NAME_LOWER) }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          file: ./docker/Dockerfile.base
          platforms: linux/arm64
          push: true
          tags: ${{ format('{0}/{1}', env.REGISTRY, env.IMAGE_NAME_LOWER) }}:base
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push production image
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          file: ./docker/Dockerfile.deploy
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
